<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Glass Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ versioned_static('style.css') }}">
</head>

<body>

    <div class="calculator">

        <!-- Header -->
        <div class="top">
            <span class="brand">
                GLASS CALC
            </span>

            <button type="button" id="gesture-toggle-btn" class="gesture-toggle" title="Use hand gestures">
                ✋
            </button>
        </div>


        <!-- Display -->
        <div class="display-box">

            <div class="history-text">
                Scientific Calculator
            </div>

            <!-- Visible Display -->
            <input type="text" id="display" class="display" value="{{ expression }}" readonly>

        </div>


        <!-- Calculator Form -->
        <form method="POST" id="calculator-form">

            <!-- Hidden value sent to Flask -->
            <input type="hidden" id="expression-input" name="expression" value="{{ expression }}">


            <div class="buttons">

                <button type="button" class="small" data-key="s" name="button" value="sin(">sin</button>
                <button type="button" class="small" data-key="c" name="button" value="cos(">cos</button>
                <button type="button" class="small" data-key="t" name="button" value="tan(">tan</button>
                <button type="button" class="small" data-key="l" name="button" value="log(">log</button>

                <button type="button" class="function" data-key="Delete" name="button" value="C">AC</button>
                <button type="button" class="function" data-key="r" name="button" value="sqrt(">√</button>
                <button type="button" class="function" data-key="(" name="button" value="(">(</button>
                <button type="button" class="function" data-key=")" name="button" value=")">)</button>

                <button type="button" data-key="7" name="button" value="7">7</button>
                <button type="button" data-key="8" name="button" value="8">8</button>
                <button type="button" data-key="9" name="button" value="9">9</button>
                <button type="button" class="operator" data-key="/" name="button" value="/">÷</button>

                <button type="button" data-key="4" name="button" value="4">4</button>
                <button type="button" data-key="5" name="button" value="5">5</button>
                <button type="button" data-key="6" name="button" value="6">6</button>
                <button type="button" class="operator" data-key="*" name="button" value="*">×</button>

                <button type="button" data-key="1" name="button" value="1">1</button>
                <button type="button" data-key="2" name="button" value="2">2</button>
                <button type="button" data-key="3" name="button" value="3">3</button>
                <button type="button" class="operator" data-key="-" name="button" value="-">−</button>

                <button type="button" class="zero" data-key="0" name="button" value="0">0</button>
                <button type="button" data-key="." name="button" value=".">.</button>
                <button type="button" class="operator" data-key="+" name="button" value="+">+</button>

                <button type="button" class="function" data-key="Backspace" name="button" value="⌫">⌫</button>
                <button type="button" class="function" data-key="p" name="button" value="pi">π</button>
                <button type="button" class="function" data-key="," name="button" value=",">,</button>
                <button type="button" id="equal-btn" class="equal" data-key="Enter" name="button" value="=">=</button>
            </div>

        </form>

    </div>


    <!-- ==============================
         HAND GESTURE PANEL
         Hidden until the ✋ button is pressed
    ============================== -->
    <div class="gesture-panel" id="gesture-panel">
        <div class="gesture-panel-inner">

            <div class="gesture-header">
                <span>Hand Gesture Input</span>
                <button type="button" id="gesture-close-btn" class="gesture-close">×</button>
            </div>

            <div class="gesture-mode-toggle">
                <button type="button" id="mode-numbers-btn" class="mode-btn active">🔢 Numbers</button>
                <button type="button" id="mode-actions-btn" class="mode-btn">✨ Actions</button>
            </div>

            <div class="gesture-video-wrap">
                <video id="gesture-video" autoplay playsinline muted></video>
                <canvas id="gesture-canvas" width="320" height="240"></canvas>
            </div>

            <div class="gesture-count-display">
                Detected: <span id="gesture-readout">0</span>
                <span id="gesture-hold-status" class="gesture-hold-status"></span>
            </div>

            <div class="gesture-hold-bar" aria-hidden="true">
                <div id="gesture-hold-progress" class="gesture-hold-progress"></div>
            </div>

            <div class="gesture-expression-box">
                <div class="gesture-expression-label">Your input</div>
                <div id="gesture-expression" class="gesture-expression">—</div>
                <div id="gesture-last-insert" class="gesture-last-insert"></div>
            </div>

            <p class="gesture-hint">
                <strong>Hold steady ~1.5s</strong> to auto-insert — no button needed.<br>
                <strong>Numbers:</strong> show 0–10 fingers across one or two hands.<br>
                <strong>Actions:</strong> ✊ Clear &nbsp;·&nbsp; 🖐 Enter &nbsp;·&nbsp; ☝️ + &nbsp;·&nbsp; 🤙 − &nbsp;·&nbsp; 🤟 × &nbsp;·&nbsp; 👉 ÷<br>
                👍 sin &nbsp;·&nbsp; 👎 cos &nbsp;·&nbsp; ✌️ tan
            </p>

        </div>
    </div>


    <!-- MediaPipe Hands (free, runs entirely client-side) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <!-- Calculator JavaScript -->
    <script src="{{ versioned_static('script.js') }}"></script>
    <script src="{{ versioned_static('gesture.js') }}"></script>

</body>

</html>
